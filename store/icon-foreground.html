<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; }
body { width: 1024px; height: 1024px; overflow: hidden; background: transparent; }
.icon {
    width: 1024px; height: 1024px;
    background: transparent;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Playfair Display', Georgia, serif;
}
.text { text-align: center; }
.mc { font-size: 280px; font-weight: 700; color: #D4A574; letter-spacing: -10px; line-height: 1; }
.line { width: 160px; height: 3px; background: #D4A574; margin: 20px auto; opacity: 0.5; }
.sub { font-size: 52px; color: #FAFAF8; font-weight: 400; letter-spacing: 12px; text-transform: uppercase; opacity: 0.8; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="icon">
    <div class="text">
        <div class="mc">MC</div>
        <div class="line"></div>
        <div class="sub">Handmade</div>
    </div>
</div>
</body>
</html>
